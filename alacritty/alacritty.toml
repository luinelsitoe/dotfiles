import = [
  "~/.config/alacritty/lavanda-sea-dark.toml"
]

[env]
TERM = "xterm-256color"

[font]
size = 13.5

[font.bold]
family = "JetBrainsMono Nerd Font Propo"
style = "Bold"

[font.bold_italic]
family = "JetBrainsMono Nerd Font Propo"
style = "Bold Italic"

[font.italic]
family = "JetBrainsMono Nerd Font Propo"
style = "Italic"

[font.normal]
family = "JetBrainsMono Nerd Font Propo"
style = "Regular"

[window]
opacity = 0.90

[cursor]
style = "Block"
