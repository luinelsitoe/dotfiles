# Configuração de cores para Kitty

# Cores primárias
background #1E1E2E
foreground #E6E6E6

# Cores do cursor
cursor #94E2D5
cursor_text #1E1E2E

# Cores do cursor em modo vi
vi_mode_cursor #89DCEB
vi_mode_cursor_text #1E1E2E

# Cores de busca
search_match_background #94E2D5
search_match_foreground #1E1E2E
search_focused_match_background #A6E3A1
search_focused_match_foreground #1E1E2E

# Cores da barra de rodapé
footer_bar_background #89DCEB
footer_bar_foreground #1E1E2E

# Cores de dicas
hints_start_background #F9E2AF
hints_start_foreground #1E1E2E
hints_end_background #89DCEB
hints_end_foreground #1E1E2E

# Cores de seleção
selection_background #D64D55
selection_foreground #E6E6E6

# Cores normais
color0 #1E1E2E
color1 #D64D55
color2 #A6E3A1
color3 #F9E2AF
color4 #89B4FA
color5 #F5C2E7
color6 #94E2D5
color7 #E6E6E6
color8 #585B70
color9 #E06C75
color10 #A6E3A1
color11 #F9E2AF
color12 #89B4FA
color13 #F5C2E7
color14 #89DCEB
color15 #FFFFFF

# Cores atenuadas
color16 #FAB387
color17 #94E2D5

# Configurações de fonte
font_family JetBrainsMono Nerd Font Propo
font_size 12
bold_font_family JetBrainsMono Nerd Font Propo
bold_font_style Bold
italic_font_family JetBrainsMono Nerd Font Propo
italic_font_style Italic
bold_italic_font_family JetBrainsMono Nerd Font Propo
bold_italic_font_style Bold Italic

# Opacidade da janela
background_opacity 0.9

# Estilo do cursor
cursor_shape block

# Definindo o TERM
env TERM=xterm-256color
