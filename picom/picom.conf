shadow = true;
shadow-radius = 12;
shadow-opacity = 1;
shadow-offset-x = -12;
shadow-offset-y = -12;
corner-radius = 13;
backend = "glx";
vsync = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;
glx-no-stencil = true;
use-damage = true;
wintypes:
{
  tooltip       = { shadow = false; opacity = 1.0;};
  dock          = { shadow = false; };
  dnd           = { shadow = false; };
  menu          = { shadow = false; blur-background = false;};
  dropdown_menu = { shadow = false; };
  popup_menu    = { shadow = false; };
  utility       = { shadow = false; blur-background = false;};
};
# Ativar fading e opacidade
fading = true;
fade-in-step = 0.05;
fade-out-step = 0.05;
fade-delta = 10;
opacity = true;
inactive-opacity = 0.95;  
active-opacity = 5;   

opacity-rule = [
    "100:class_g = 'firefox'",
    "100:class_g = 'vlc'",
    "100:class_g = 'smplayer'",
    "100:class_g = 'Mysql-workbench-bin'"
]

# Blur
blur-method = "dual_kawase";
blur-strength = 5;

# xprop WM_CLASS para pegar classes 
blur-background-exclude = [
  "role   = 'xborder'",
  "class_g = 'ONLYOFFICE Desktop Editors'",
  "class_g = 'Xfce4-screenshooter'",
  "class_g = 'Mysql-workbench-bin'"
];
